<!DOCTYPE html>
<html>
<head>
    <title>EmulatorJS</title>
    <link rel="icon" href="docs/favicon.ico" sizes="16x16 32x32 48x48 64x64" type="image/vnd.microsoft.icon">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: black;
            color: white;
            overflow: hidden;
            font-family: monospace;
        }

        #display {
            width: 100%;
            height: 100%;
        }

        #game {
            width: 100%;
            height: 100%;
        }

        .error-box {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .error-box-inner {
            max-width: 720px;
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 24px;
        }

        .error-box h2 {
            margin-top: 0;
            color: #fff;
        }

        .error-box p {
            color: #ccc;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <script>
        let enableDebug = false;
        let enableThreads = false;

        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);

        if (parseInt(urlParams.get('debug')) === 1 || urlParams.get('debug') === 'true') {
            enableDebug = true;
            console.log('Debug is enabled');
        } else {
            console.log('Debug is disabled');
        }

        if (parseInt(urlParams.get('threads')) === 1 || urlParams.get('threads') === 'true') {
            if (window.SharedArrayBuffer) {
                enableThreads = true;
                console.log('Threads are enabled');
            } else {
                console.warn('Threads are disabled because SharedArrayBuffer is not available.');
                console.log('Threads are disabled');
            }
        } else {
            console.log('Threads are disabled');
        }

        function showError(message) {
            document.body.innerHTML = `
                <div class="error-box">
                    <div class="error-box-inner">
                        <h2>Không thể chạy game</h2>
                        <p>${message}</p>
                    </div>
                </div>
            `;
        }

        function detectCoreFromExtension(ext) {
            ext = ext.toLowerCase();

            if (["fds", "nes", "unif", "unf"].includes(ext)) return "nes";
            if (["smc", "fig", "sfc", "gd3", "gd7", "dx2", "bsx", "swc"].includes(ext)) return "snes";
            if (["z64", "n64"].includes(ext)) return "n64";
            if (["pce"].includes(ext)) return "pce";
            if (["ngp", "ngc"].includes(ext)) return "ngp";
            if (["ws", "wsc"].includes(ext)) return "ws";
            if (["col", "cv"].includes(ext)) return "coleco";
            if (["d64"].includes(ext)) return "vice_x64sc";
            if (["nds", "gba", "gb"].includes(ext)) return ext;
             if (["gbc"].includes(ext)) return "gb";

            return "";
        }

        function runFromRom(file) {
            const romFile = file.trim();

            if (!romFile) {
                showError('Thiếu tham số ROM. Hãy truyền dạng ?rom=tenfile.gba');
                return;
            }

            const parts = romFile.split(".");
            const ext = parts.length > 1 ? parts.pop() : "";
            const core = detectCoreFromExtension(ext);

            if (!core) {
                showError('Không nhận diện được core từ phần mở rộng file ROM.');
                return;
            }

            const gameName = romFile.includes(".")
                ? romFile.substring(0, romFile.lastIndexOf("."))
                : romFile;

            const display = document.createElement("div");
            const game = document.createElement("div");
            const script = document.createElement("script");

            display.id = "display";
            game.id = "game";

            display.appendChild(game);
            document.body.innerHTML = "";
            document.body.appendChild(display);

            window.EJS_player = "#game";
            window.EJS_gameName = gameName;
            window.EJS_biosUrl = "";
            window.EJS_gameUrl = "roms/" + romFile;
            window.EJS_core = core;
            window.EJS_pathtodata = "data/";
            window.EJS_startOnLoaded = true;
            window.EJS_DEBUG_XX = enableDebug;
            window.EJS_disableDatabases = true;
            window.EJS_threads = enableThreads;

            script.src = "data/loader.js";
            document.body.appendChild(script);
        }

        const rom = urlParams.get('rom');

        if (rom) {
            console.log(`Loading ROM from URL: roms/${rom}`);
            runFromRom(rom);
        } else {
            showError('Không có ROM để chạy. Vui lòng mở trang với tham số ?rom=tenfile.gba');
        }
    </script>
</body>
</html>
